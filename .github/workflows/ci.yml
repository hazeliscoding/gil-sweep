name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            desktop/renderer/package-lock.json

      # Electron's binary isn't needed for the type/Angular builds, so skip its
      # (large) download to keep CI fast.
      - name: Install desktop deps
        working-directory: desktop
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Install renderer deps
        working-directory: desktop/renderer
        run: npm ci

      - name: Build renderer (Angular)
        working-directory: desktop/renderer
        run: npm run build

      - name: Build main (tsc)
        working-directory: desktop
        run: npm run build:main
