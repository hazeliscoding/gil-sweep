name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the portable
# Windows exe and upload it to a DRAFT GitHub Release. Publish the draft manually
# after checking the assets: `gh release edit vX.Y.Z --draft=false --latest`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            desktop/renderer/package-lock.json

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Install renderer deps
        working-directory: desktop/renderer
        run: npm ci

      - name: Build renderer (Angular)
        working-directory: desktop/renderer
        run: npm run build

      - name: Build main (tsc)
        working-directory: desktop
        run: npm run build:main

      # Unsigned: Windows SmartScreen will warn on first run of the portable exe.
      - name: Package + publish draft release (electron-builder)
        working-directory: desktop
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
